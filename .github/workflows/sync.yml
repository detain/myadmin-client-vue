---
name: Sync - Syncs Master with Electron + Capacitor, Triggers Builds

on:
    push:
        branches: [master, electron, capacitor]
        tags: ['*']
    workflow_dispatch:
        inputs:
            run_target:
                description: 'Target pipeline to run (electron or capacitor)'
                required: true
                type: choice
                options:
                    - electron
                    - capacitor
    pull_request:
        branches: [master, electron, capacitor]
    release:
        types: [created]

env:
    NODE_VERSION: 22
    YARN_VERSION: 1.22.22
    GH_TOKEN: ${{ github.token }}

permissions:
    actions: write
    contents: write

jobs:
    sync-release-branches:
        name: Sync master to release branches
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        concurrency:
            group: sync-${{ github.ref }}-${{ github.event_name }}
            cancel-in-progress: true
        runs-on: ubuntu-latest
        outputs:
            electron_merged: ${{ steps.sync.outputs.electron_merged }}
            capacitor_merged: ${{ steps.sync.outputs.capacitor_merged }}

        steps:
            - name: checkout repo
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Enable Corepack and set Yarn version
              run: |
                  corepack enable
                  corepack prepare yarn@${{ env.YARN_VERSION }} --activate

            - name: Configure Git
              run: |
                  git config user.name "github-actions"
                  git config user.email "github-actions@github.com"

            - name: Sync electron + capacitor with master
              id: sync
              run: |
                  set -euo pipefail

                  merge_branch() {
                    local target_branch="$1"

                    git switch "$target_branch"
                    git pull --all

                    if git merge origin/master --no-ff -Xignore-space-change; then
                      git push origin "$target_branch"
                      return 0
                    fi

                    local conflicts
                    conflicts="$(git diff --name-only --diff-filter=U)"

                    if [ -z "$conflicts" ]; then
                      echo "Merge failed without conflict files for ${target_branch}."
                      return 1
                    fi

                    if [ "$(echo "$conflicts" | wc -l | tr -d ' ')" -eq 1 ] && [ "$conflicts" = "yarn.lock" ]; then
                      yarn
                      git add yarn.lock
                      git commit --no-edit
                      git push origin "$target_branch"
                      return 0
                    fi

                    echo "Merge conflict includes files beyond yarn.lock for ${target_branch}:"
                    echo "$conflicts"
                    return 1
                  }

                  electron_merged=false
                  capacitor_merged=false

                  merge_branch electron
                  electron_merged=true

                  git switch master

                  merge_branch capacitor
                  capacitor_merged=true

                  echo "electron_merged=${electron_merged}" >> "$GITHUB_OUTPUT"
                  echo "capacitor_merged=${capacitor_merged}" >> "$GITHUB_OUTPUT"

    trigger-electron-build:
        name: Trigger Electron workflow
        needs: sync-release-branches
        if: needs.sync-release-branches.outputs.electron_merged == 'true'
        runs-on: ubuntu-latest
        steps:
            - name: Trigger electron pipeline on electron branch
              uses: actions/github-script@v8
              with:
                  script: |
                      await github.rest.actions.createWorkflowDispatch({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        workflow_id: 'ci-cd.yml',
                        ref: 'electron',
                        inputs: { run_target: 'electron' }
                      });

    trigger-capacitor-build:
        name: Trigger Capacitor workflow
        needs: sync-release-branches
        if: needs.sync-release-branches.outputs.capacitor_merged == 'true'
        runs-on: ubuntu-latest
        steps:
            - name: Trigger capacitor pipeline on capacitor branch
              uses: actions/github-script@v8
              with:
                  script: |
                      await github.rest.actions.createWorkflowDispatch({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        workflow_id: 'ci-cd.yml',
                        ref: 'capacitor',
                        inputs: { run_target: 'capacitor' }
                      });

