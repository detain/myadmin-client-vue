---
name: CI/CD - Web, Electron, Capacitor

on:
    push:
        branches: [master, electron, capacitor]
        tags: ['*']
    workflow_dispatch:
        inputs:
            run_target:
                description: 'Target pipeline to run (electron or capacitor)'
                required: true
                type: choice
                options:
                    - electron
                    - capacitor
    pull_request:
        branches: [master, electron, capacitor]
    release:
        types: [created]

env:
    NODE_VERSION: 22
    YARN_VERSION: 1.22.22
    GH_TOKEN: ${{ github.token }}

permissions:
    actions: write
    contents: write

jobs:
    # ---------------- TEST + LINT + COVERAGE ----------------
    test:
        name: Test & Lint
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/master')
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Enable Corepack and set Yarn version
              run: |
                  corepack enable
                  corepack prepare yarn@${{ env.YARN_VERSION }} --activate

            - name: Install dependencies
              run: yarn install

            - name: Lint
              run: yarn lint

            - name: Type check
              run: yarn ts

            - name: Run unit tests with coverage
              run: yarn test:coverage

            - name: Upload test results
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  name: test-results
                  path: |
                      test-results.xml
                      test-results.json

            - name: Upload coverage report
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  name: coverage-report
                  path: coverage/

            - name: Generate coverage badge
              if: success()
              uses: jaywcjlove/coverage-badges-cli@v2.1.0
              with:
                  source: coverage/coverage-summary.json
                  output: coverage/badge.svg

            - name: Upload coverage badge
              if: success()
              uses: actions/upload-artifact@v7
              with:
                  name: coverage-badge
                  path: coverage/badge.svg

            # DISABLED: auto-update README with test results (re-enable when ready)
            # - name: Update README with test results
            - name: Update README with test results (disabled)
              if: false # was: success() && github.event_name == 'push' && github.ref == 'refs/heads/master'
              run: |
                  # Parse test-results.json and coverage-summary.json into a README section
                  node -e "
                  const fs = require('fs');
                  const results = JSON.parse(fs.readFileSync('test-results.json', 'utf8'));
                  const coverage = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));

                  const suites = results.numTotalTestSuites || 0;
                  const tests = results.numTotalTests || 0;
                  const passed = results.numPassedTests || 0;
                  const failed = results.numFailedTests || 0;
                  const skipped = (results.numPendingTests || 0) + (results.numTodoTests || 0);
                  const duration = ((results.testResults || []).reduce((a, t) => a + (t.endTime || 0) - (t.startTime || 0), 0) / 1000).toFixed(2);
                  const statusIcon = failed > 0 ? '🔴' : '🟢';
                  const date = new Date().toISOString().split('T')[0];

                  const total = coverage.total || {};
                  const stmts = total.statements?.pct ?? '—';
                  const branch = total.branches?.pct ?? '—';
                  const funcs = total.functions?.pct ?? '—';
                  const lines = total.lines?.pct ?? '—';

                  // Build per-category coverage rows
                  const categoryMap = {};
                  for (const [filePath, data] of Object.entries(coverage)) {
                    if (filePath === 'total') continue;
                    const rel = filePath.replace(/^.*?src\//, 'src/');
                    const cat = rel.split('/')[1] || 'other';
                    const label = cat.charAt(0).toUpperCase() + cat.slice(1);
                    if (!categoryMap[label]) categoryMap[label] = { stmts: [], branch: [], funcs: [], lines: [] };
                    categoryMap[label].stmts.push(data.statements?.pct ?? 0);
                    categoryMap[label].branch.push(data.branches?.pct ?? 0);
                    categoryMap[label].funcs.push(data.functions?.pct ?? 0);
                    categoryMap[label].lines.push(data.lines?.pct ?? 0);
                  }
                  const avg = arr => arr.length ? (arr.reduce((a, b) => a + b, 0) / arr.length).toFixed(2) : '—';
                  const catRows = Object.entries(categoryMap)
                    .sort(([a], [b]) => a.localeCompare(b))
                    .map(([label, d]) => '| ' + label + ' | ' + avg(d.stmts) + ' | ' + avg(d.branch) + ' | ' + avg(d.funcs) + ' | ' + avg(d.lines) + ' |')
                    .join('\n');

                  // Build failed test details
                  let failedSection = '';
                  if (failed > 0) {
                    const failedTests = (results.testResults || [])
                      .filter(t => t.status === 'failed')
                      .flatMap(t => (t.assertionResults || []).filter(a => a.status === 'failed').map(a => '- \`' + a.fullName + '\`'))
                      .slice(0, 20);
                    if (failedTests.length) {
                      failedSection = '\n\n<details>\n<summary>Failed Tests</summary>\n\n' + failedTests.join('\n') + '\n\n</details>';
                    }
                  }

                  const md = '<!-- TEST-RESULTS-START -->\n' +
                    '### Latest Test Results\n\n' +
                    statusIcon + ' **' + passed + '/' + tests + ' tests passing** across ' + suites + ' suites | ' + duration + 's' +
                    (skipped > 0 ? ' | ' + skipped + ' skipped' : '') +
                    (failed > 0 ? ' | ' + failed + ' failed' : '') +
                    '\n\n' +
                    '| Category | % Stmts | % Branch | % Funcs | % Lines |\n' +
                    '|----------|---------|----------|---------|---------|' + '\n' +
                    '| **All files** | ' + stmts + ' | ' + branch + ' | ' + funcs + ' | ' + lines + ' |' + '\n' +
                    catRows +
                    failedSection + '\n\n' +
                    '_Last updated: ' + date + ' via [CI/CD](https://github.com/detain/myadmin-client-vue/actions/workflows/ci-cd.yml)_\n' +
                    '<!-- TEST-RESULTS-END -->';

                  // Replace in README.md
                  let readme = fs.readFileSync('README.md', 'utf8');
                  const startTag = '<!-- TEST-RESULTS-START -->';
                  const endTag = '<!-- TEST-RESULTS-END -->';
                  const startIdx = readme.indexOf(startTag);
                  const endIdx = readme.indexOf(endTag);
                  if (startIdx !== -1 && endIdx !== -1) {
                    readme = readme.substring(0, startIdx) + md + readme.substring(endIdx + endTag.length);
                  }
                  fs.writeFileSync('README.md', readme);
                  console.log('README.md updated with test results');
                  "

            # DISABLED: commit README update (re-enable when ready)
            - name: Commit updated README (disabled)
              if: false # was: success() && github.event_name == 'push' && github.ref == 'refs/heads/master'
              run: |
                  git config user.name "github-actions"
                  git config user.email "github-actions@github.com"
                  git add README.md
                  git diff --cached --quiet && echo "No changes to commit" || git commit -m "ci: update test results in README [skip ci]" && git push

    # ---------------- VISUAL REGRESSION TESTS ----------------
    visual-test:
        name: Visual Regression Tests
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Enable Corepack and set Yarn version
              run: |
                  corepack enable
                  corepack prepare yarn@${{ env.YARN_VERSION }} --activate

            - name: Install dependencies
              run: yarn install

            - name: Install Playwright browsers
              run: npx --no playwright install --with-deps chromium

            - name: Run visual regression tests
              run: yarn test:visual

            - name: Upload screenshot baselines
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  name: visual-regression-screenshots
                  path: test/visual/__screenshots__/

            - name: Upload diff attachments
              if: failure()
              uses: actions/upload-artifact@v7
              with:
                  name: visual-regression-diffs
                  path: .vitest-attachments/

    sync-release-branches:
        name: Sync master to release branches
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        concurrency:
            group: sync-${{ github.ref }}-${{ github.event_name }}
            cancel-in-progress: true
        runs-on: ubuntu-latest
        outputs:
            electron_merged: ${{ steps.sync.outputs.electron_merged }}
            capacitor_merged: ${{ steps.sync.outputs.capacitor_merged }}

        steps:
            - name: checkout repo
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Enable Corepack and set Yarn version
              run: |
                  corepack enable
                  corepack prepare yarn@${{ env.YARN_VERSION }} --activate

            - name: Configure Git
              run: |
                  git config user.name "github-actions"
                  git config user.email "github-actions@github.com"

            - name: Sync electron + capacitor with master
              id: sync
              run: |
                  set -euo pipefail

                  merge_branch() {
                    local target_branch="$1"

                    git switch "$target_branch"
                    git pull --all

                    if git merge origin/master --no-ff -Xignore-space-change; then
                      git push origin "$target_branch"
                      return 0
                    fi

                    local conflicts
                    conflicts="$(git diff --name-only --diff-filter=U)"

                    if [ -z "$conflicts" ]; then
                      echo "Merge failed without conflict files for ${target_branch}."
                      return 1
                    fi

                    if [ "$(echo "$conflicts" | wc -l | tr -d ' ')" -eq 1 ] && [ "$conflicts" = "yarn.lock" ]; then
                      yarn
                      git add yarn.lock
                      git commit --no-edit
                      git push origin "$target_branch"
                      return 0
                    fi

                    echo "Merge conflict includes files beyond yarn.lock for ${target_branch}:"
                    echo "$conflicts"
                    return 1
                  }

                  electron_merged=false
                  capacitor_merged=false

                  merge_branch electron
                  electron_merged=true

                  git switch master

                  merge_branch capacitor
                  capacitor_merged=true

                  echo "electron_merged=${electron_merged}" >> "$GITHUB_OUTPUT"
                  echo "capacitor_merged=${capacitor_merged}" >> "$GITHUB_OUTPUT"

    trigger-electron-build:
        name: Trigger Electron workflow
        needs: sync-release-branches
        if: needs.sync-release-branches.outputs.electron_merged == 'true'
        runs-on: ubuntu-latest
        steps:
            - name: Trigger electron pipeline on electron branch
              uses: actions/github-script@v8
              with:
                  script: |
                      await github.rest.actions.createWorkflowDispatch({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        workflow_id: 'ci-cd.yml',
                        ref: 'electron',
                        inputs: { run_target: 'electron' }
                      });

    trigger-capacitor-build:
        name: Trigger Capacitor workflow
        needs: sync-release-branches
        if: needs.sync-release-branches.outputs.capacitor_merged == 'true'
        runs-on: ubuntu-latest
        steps:
            - name: Trigger capacitor pipeline on capacitor branch
              uses: actions/github-script@v8
              with:
                  script: |
                      await github.rest.actions.createWorkflowDispatch({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        workflow_id: 'ci-cd.yml',
                        ref: 'capacitor',
                        inputs: { run_target: 'capacitor' }
                      });

    # ---------------- WEB BUILD ON MASTER ----------------
    web-build:
        name: Web Build
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
        concurrency:
            group: web-build-${{ github.ref }}-${{ github.event_name }}
            cancel-in-progress: true
        runs-on: ubuntu-latest

        steps:
            - name: checkout repo
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0 # fetch full history

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Enable Corepack and set Yarn version
              run: |
                  corepack enable
                  corepack prepare yarn@${{ env.YARN_VERSION }} --activate

            #- name: Cache Yarn
            #  uses: actions/cache@v4
            #  with:
            #      path: |
            #          .yarn/cache
            #          .yarn/unplugged
            #          .yarn/install-state.gz
            #      key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
            #      restore-keys: |
            #          yarn-${{ runner.os }}-

            - name: Read version
              run: echo "APP_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

            - name: Install dependencies
              run: yarn install

            - name: Build Web / Site
              run: yarn build

            - name: Zip dist for tag
              if: startsWith(github.ref, 'refs/tags/')
              run: zip -r my-interserver-client-web-${APP_VERSION}.zip dist

            - name: Upload tagged artifact
              if: startsWith(github.ref, 'refs/tags/')
              uses: actions/upload-artifact@v7
              with:
                  name: web
                  path: my-interserver-client-web-${APP_VERSION}.zip

            - name: Zip dist for dev
              run: zip -r my-interserver-client-web-dev-master.zip dist

            - name: Upload dev artifact
              uses: actions/upload-artifact@v7
              with:
                  name: web
                  path: my-interserver-client-web-dev-master.zip

            - name: Setup SSH key
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.SFTP_KEY }}" > ~/.ssh/id_ed25519
                  chmod 600 ~/.ssh/id_ed25519
                  ssh-keyscan -t ed25519 -H ${{ secrets.SFTP_HOST }} >> ~/.ssh/known_hosts

            - name: Upload files via SCP
              run: |
                  scp -o StrictHostKeyChecking=accept-new \
                    -o Compression=no \
                    -o Ciphers=chacha20-poly1305@openssh.com \
                    -o ControlMaster=auto -o ControlPersist=60 -v -r \
                    *.zip ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:/uploads/web/

            - name: Publish release zip (if tag)
              if: startsWith(github.ref, 'refs/tags/')
              run: gh release upload ${GITHUB_REF_NAME} my-interserver-client-web-${APP_VERSION}.zip --clobber

    # ---------------- ELECTRON BUILD ON ELECTRON BRANCH ----------------
    electron-build:
        name: Electron Build
        if: github.ref == 'refs/heads/electron' || startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_target == 'electron')
        concurrency:
            group: electron-${{ matrix.platform }}-${{ matrix.arch }}-build-${{ github.ref }}-${{ github.event_name }}
            cancel-in-progress: true
        runs-on: ${{ matrix.os }}

        strategy:
            fail-fast: false
            matrix:
                include:
                    # Linux
                    - os: ubuntu-latest
                      platform: linux
                      arch: x64
                      build_args: --linux AppImage snap deb --x64
                    - os: ubuntu-latest
                      platform: linux
                      arch: arm64
                      build_args: --linux AppImage deb --arm64

                    # Windows
                    - os: windows-latest
                      platform: win
                      arch: x64
                      build_args: --win nsis portable --x64
                    - os: windows-latest
                      platform: win
                      arch: arm64
                      build_args: --win nsis portable --arm64

                    # macOS
                    - os: macos-latest
                      platform: mac
                      arch: universal
                      build_args: --mac dmg pkg

        env:
            ELECTRON_CACHE: ~/.cache/electron
            ELECTRON_BUILDER_CACHE: ~/.cache/electron-builder
            # Signing / notarization (only needed for tagged builds)
            #CSC_LINK: ${{ secrets.CSC_LINK }}
            #CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
            #WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
            #WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
            APPLE_ID: ${{ secrets.APPLE_ID }}
            APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
            APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
            #CSC_IDENTITY_AUTO_DISCOVERY: ${{ env.CSC_IDENTITY_AUTO_DISCOVERY || 'true' }}
            CSC_IDENTITY_AUTO_DISCOVERY: false
            CSC_KEY_PASSWORD: ""
            CSC_LINK: ""
            WIN_CSC_KEY_PASSWORD: ""
            WIN_CSC_LINK: ""

        steps:
            - name: checkout repo
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0 # fetch full history

            - name: Switch Branch
              run: |
                  git switch electron
                  git pull --all

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Enable Corepack and set Yarn version
              run: |
                  corepack enable
                  corepack prepare yarn@${{ env.YARN_VERSION }} --activate

            #- name: Cache Yarn
            #  uses: actions/cache@v4
            #  with:
            #      path: |
            #          .yarn/cache
            #          .yarn/unplugged
            #          .yarn/install-state.gz
            #      key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
            #      restore-keys: |
            #          yarn-${{ runner.os }}-

            - name: Restore Electron cache
              uses: actions/cache@v5
              with:
                  path: |
                      ~/.cache/electron
                      ~/.cache/electron-builder
                  key: electron-${{ runner.os }}-${{ hashFiles('yarn.lock') }}

            - name: Read app version
              shell: bash
              run: echo "APP_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

            - name: Install dependencies
              run: yarn install

            - name: Build Web / Site
              run: yarn build

            - name: Install Linux dependencies
              if: matrix.platform == 'linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libarchive-tools rpm
                  if echo "${{ matrix.build_args }}" | grep -q snap; then
                    sudo snap install snapcraft --classic
                  fi

            # Disable code signing for PRs and CI Mac builds
            - name: Disable signing for PRs / CI Mac
              if: github.event_name == 'pull_request' || matrix.platform == 'mac'
              shell: bash
              run: echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> $GITHUB_ENV

            # Build Electron
            - name: Build Electron app
              run: yarn electron-builder ${{ matrix.build_args }} --publish never
              env:
                  #CSC_IDENTITY_AUTO_DISCOVERY: ${{ env.CSC_IDENTITY_AUTO_DISCOVERY || 'true' }}
                  CSC_IDENTITY_AUTO_DISCOVERY: false
                  CSC_KEY_PASSWORD: ""
                  CSC_LINK: ""

            # ---------------- ZIP UNPACKED ----------------
            - name: Zip unpacked (Linux)
              if: matrix.platform == 'linux'
              run: |
                  cd dist
                  if [ "${{ matrix.arch }}" = "arm64" ]; then
                    zip -r my-interserver-client-${APP_VERSION}-linux-${{ matrix.arch }}.zip linux-arm64-unpacked
                  else
                    zip -r my-interserver-client-${APP_VERSION}-linux-${{ matrix.arch }}.zip linux-unpacked
                  fi

            - name: Zip unpacked (Windows)
              if: matrix.platform == 'win'
              shell: pwsh
              run: |
                  cd dist
                  if ("${{ matrix.arch }}" -eq "arm64") {
                    $src = "win-arm64-unpacked"
                  } else {
                    $src = "win-unpacked"
                  }
                  $zip = "my-interserver-client-$env:APP_VERSION-windows-${{ matrix.arch }}.zip"
                  Compress-Archive -Path $src -DestinationPath $zip

            - name: Zip unpacked (macOS)
              if: matrix.platform == 'mac'
              run: |
                  cd dist
                  zip -r my-interserver-client-${APP_VERSION}-mac.zip mac-unpacked

            - name: Upload DEB packages
              uses: actions/upload-artifact@v7
              with:
                  name: ${{ matrix.platform }}-${{ matrix.arch }}-deb
                  path: dist/*.deb
                  if-no-files-found: ignore

            - name: Upload AppImage packages
              uses: actions/upload-artifact@v7
              with:
                  name: ${{ matrix.platform }}-${{ matrix.arch }}-appimage
                  path: dist/*.AppImage
                  if-no-files-found: ignore

            - name: Upload Snap packages
              uses: actions/upload-artifact@v7
              with:
                  name: ${{ matrix.platform }}-${{ matrix.arch }}-snap
                  path: dist/*.snap
                  if-no-files-found: ignore

            - name: Upload Windows installers
              if: matrix.platform == 'win'
              uses: actions/upload-artifact@v7
              with:
                  name: windows${{ matrix.arch }}-installer
                  path: dist/*setup*.exe
                  if-no-files-found: ignore

            - name: Upload Windows portable builds
              if: matrix.platform == 'win'
              uses: actions/upload-artifact@v7
              with:
                  name: windows-${{ matrix.arch }}-portable
                  path: dist/*portable*.exe
                  if-no-files-found: ignore

            - name: Upload macOS Dmg images
              if: matrix.platform == 'mac'
              uses: actions/upload-artifact@v7
              with:
                  name: macos-${{ matrix.arch }}-dmg
                  path: dist/*.dmg
                  if-no-files-found: ignore

            - name: Upload macOS Pkg images
              if: matrix.platform == 'mac'
              uses: actions/upload-artifact@v7
              with:
                  name: macos-${{ matrix.arch }}-pkg
                  path: dist/*.pkg
                  if-no-files-found: ignore

            - name: Upload unpacked zips
              uses: actions/upload-artifact@v7
              with:
                  name: ${{ matrix.platform }}-${{ matrix.arch }}-unpacked
                  path: dist/*.zip
                  if-no-files-found: ignore

            - name: Setup SSH key
              shell: bash
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.SFTP_KEY }}" > ~/.ssh/id_ed25519
                  chmod 600 ~/.ssh/id_ed25519
                  echo "${{ secrets.SFTP_HOST_KEY }}" >> ~/.ssh/known_hosts

            - name: Upload files via SCP
              shell: bash
              run: |
                  scp -o StrictHostKeyChecking=accept-new -o KexAlgorithms=curve25519-sha256 -o Compression=no -o Ciphers=chacha20-poly1305@openssh.com -o ControlMaster=auto -o ControlPersist=60 -v -r dist/* ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:/uploads/electron/${{ matrix.platform }}-${{ matrix.arch }}/

            # ---------------- RELEASE ASSETS ----------------
            - name: Publish release assets (tags)
              if: startsWith(github.ref, 'refs/tags/')
              shell: bash
              run: |
                  find dist -maxdepth 1 -type f | xargs gh release upload ${GITHUB_REF_NAME} --clobber

            # ---------------- UPDATE README WITH DOWNLOAD LINKS ----------------
            - name: Update README with latest download links
              if: startsWith(github.ref, 'refs/tags/')
              shell: bash
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  REPO_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"

                  WEB_URL="${REPO_URL}/my-interserver-client-web-${VERSION}.zip"
                  LINUX_URL_X64="${REPO_URL}/my-interserver-client-${VERSION}-linux-x64.zip"
                  LINUX_URL_ARM64="${REPO_URL}/my-interserver-client-${VERSION}-linux-arm64.zip"
                  WIN_URL_X64="${REPO_URL}/my-interserver-client-${VERSION}-windows-x64.zip"
                  WIN_URL_ARM64="${REPO_URL}/my-interserver-client-${VERSION}-windows-arm64.zip"
                  MAC_URL="${REPO_URL}/my-interserver-client-${VERSION}-mac.zip"

                  echo -e "<!-- DOWNLOADS-START -->\n## Latest Downloads (v${VERSION})\n\n### Web\n- [Web (zip)](${WEB_URL})\n\n### Electron\n#### Linux\n- [x64](${LINUX_URL_X64})\n- [arm64](${LINUX_URL_ARM64})\n#### Windows\n- [x64](${WIN_URL_X64})\n- [arm64](${WIN_URL_ARM64})\n#### macOS\n- [Universal](${MAC_URL})\n<!-- DOWNLOADS-END -->" > latest-downloads.md

                  awk '
                    BEGIN {in_block=0}
                    /<!-- DOWNLOADS-START -->/ {
                      system("cat latest-downloads.md")
                      in_block=1
                      next
                    }
                    /<!-- DOWNLOADS-END -->/ {
                      in_block=0
                      next
                    }
                    !in_block {print}
                  ' README.md > README.tmp && mv README.tmp README.md

                  git config user.name "github-actions"
                  git config user.email "github-actions@github.com"
                  git add README.md
                  git commit -m "Update latest download links for v${VERSION}" || echo "No changes to commit"
                  git push

    android:
        name: Android Build
        if: github.ref == 'refs/heads/capacitor' || startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_target == 'capacitor')
        concurrency:
            group: android-build-${{ github.ref }}-${{ github.event_name }}
            cancel-in-progress: true
        runs-on: ubuntu-latest

        steps:
            - name: checkout repo
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0 # fetch full history

            - name: Switch Branch
              run: |
                  git switch capacitor
                  git pull --all

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Enable Corepack and set Yarn version
              run: |
                  corepack enable
                  corepack prepare yarn@${{ env.YARN_VERSION }} --activate

            #- name: Cache Yarn
            #  uses: actions/cache@v4
            #  with:
            #      path: |
            #          .yarn/cache
            #          .yarn/unplugged
            #          .yarn/install-state.gz
            #      key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
            #      restore-keys: |
            #          yarn-${{ runner.os }}-

            - name: Setup Java 21
              uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: 21
                  cache: gradle

            - name: Cache Gradle
              uses: actions/cache@v5
              with:
                  path: |
                      ~/.gradle/caches
                      ~/.gradle/wrapper
                  key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
                  restore-keys: |
                      gradle-${{ runner.os }}-

            - name: Install dependencies
              run: yarn install

            - name: Build web assets
              run: yarn build

            - name: Capacitor sync (Android)
              run: yarn cap sync android

            - name: Build Android APK
              env:
                  JAVA_HOME: ${{ env.JAVA_HOME }}
              run: |
                  cd android
                  ./gradlew assembleRelease --no-daemon

            - name: Upload Android APK
              uses: actions/upload-artifact@v7
              with:
                  name: android-apk
                  path: android/app/build/outputs/apk/release/app-release-unsigned.apk

            - name: Upload Android APK
              uses: actions/upload-artifact@v7
              with:
                  name: android
                  path: android/app/build/outputs/apk/release/*.apk

            - name: Setup SSH key
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.SFTP_KEY }}" > ~/.ssh/id_ed25519
                  chmod 600 ~/.ssh/id_ed25519
                  echo "${{ secrets.SFTP_HOST_KEY }}" >> ~/.ssh/known_hosts

            - name: Upload files via SCP
              run: |
                  scp -o StrictHostKeyChecking=accept-new \
                    -o Compression=no \
                    -o Ciphers=chacha20-poly1305@openssh.com \
                    -o ControlMaster=auto -o ControlPersist=60 -v -r \
                    android/app/build/outputs/apk/release/*.apk ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:/uploads/android/

    ios:
        name: iOS Build
        if: github.ref == 'refs/heads/capacitor' || startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_target == 'capacitor')
        concurrency:
            group: ios-build-${{ github.ref }}-${{ github.event_name }}
            cancel-in-progress: true
        runs-on: macos-latest

        steps:
            - name: checkout repo
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0 # fetch full history

            - name: Switch Branch
              run: |
                  git switch capacitor
                  git pull --all

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Enable Corepack and set Yarn version
              run: |
                  corepack enable

            #- name: Cache Yarn
            #  uses: actions/cache@v4
            #  with:
            #      path: |
            #          .yarn/cache
            #          .yarn/unplugged
            #          .yarn/install-state.gz
            #      key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
            #      restore-keys: |
            #          yarn-${{ runner.os }}-

            - name: Install dependencies
              run: yarn install

            - name: Build web assets
              run: yarn build

            - name: Ensure iOS project exists
              run: yarn cap add ios || echo "iOS project already exists"

            - name: Capacitor sync iOS
              run: yarn cap sync ios

            - name: Cache CocoaPods
              uses: actions/cache@v5
              with:
                  path: |
                      ios/App/Pods
                      ~/Library/Caches/CocoaPods
                      ~/.cocoapods
                  key: cocoapods-${{ runner.os }}-${{ hashFiles('ios/App/Podfile.lock') }}
                  restore-keys: |
                      cocoapods-${{ runner.os }}-

            - name: Install CocoaPods
              run: |
                  cd ios/App
                  pod install --repo-update

            - name: Build iOS (unsigned)
              run: |
                  cd ios/App
                  xcodebuild \
                    -workspace App.xcworkspace \
                    -scheme App \
                    -configuration Release \
                    -sdk iphoneos \
                    -derivedDataPath build \
                    CODE_SIGNING_ALLOWED=NO

            - name: Package iOS artifact
              run: |
                  cd ios/App
                  mkdir -p artifacts
                  cp -R build/Build/Products/Release-iphoneos/App.app artifacts/

            - name: Upload iOS artifact
              uses: actions/upload-artifact@v7
              with:
                  name: ios-app
                  path: ios/App/artifacts

            - uses: actions/upload-artifact@v7
              with:
                  name: ios
                  path: ios/App/build/Build/Products/Release-iphoneos

            - name: Setup SSH key
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.SFTP_KEY }}" > ~/.ssh/id_ed25519
                  chmod 600 ~/.ssh/id_ed25519
                  echo "${{ secrets.SFTP_HOST_KEY }}" >> ~/.ssh/known_hosts

            - name: Upload files via SCP
              run: |
                  scp -o StrictHostKeyChecking=accept-new \
                    -o Compression=no \
                    -o Ciphers=chacha20-poly1305@openssh.com \
                    -o ControlMaster=auto -o ControlPersist=60 -v \
                    -r ios/App/artifacts/* \
                    ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:/uploads/ios/
